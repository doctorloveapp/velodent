[package]
name = "velodent"
version = "0.1.0"
description = "VeloDent clinical management desktop application"
authors = ["VeloDent"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "velodent_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tauri = { version = "2.11.2", features = [] }
